name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r guardian/requirements.txt
          # Essential test and runtime dependencies
          pip install pytest requests-mock PyYAML anyio httpx pytest-mock

      - name: Run test suite
        env:
          # Senior touch: ensure all module paths are visible to the test runner
          PYTHONPATH: ./:./guardian:./guardian/guardian:./agent
        run: pytest tests/ -v --tb=native

      - name: Docker smoke test
        run: |
          cp .env.example .env
          sed -i "s/API_KEY=CHANGE_ME/API_KEY=ci-test-key-123/" .env
          # Ensure docker-compose uses the ci key
          docker compose up -d --build guardian
          echo "Waiting for guardian to start..."
          sleep 20
          curl -f -H "X-API-Key: ci-test-key-123" http://localhost:5000/health
          docker compose down
