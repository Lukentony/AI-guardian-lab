name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install both Guardian and Agent dependencies to prevent ImportErrors during collection
          pip install -r guardian/requirements.txt
          pip install -r agent/requirements.txt
          pip install pytest requests-mock PyYAML anyio httpx pytest-mock litellm flask-limiter

      - name: Run test suite
        run: python -m pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

      - name: SAST scan (bandit)
        run: |
          pip install bandit
          bandit -r guardian/ -f json -o bandit-report.json || true

      - name: Upload SAST report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
      - name: Docker smoke test
        run: |
          cp .env.example .env
          sed -i "s/API_KEY=CHANGE_ME/API_KEY=ci-test-key-123/" .env
          # Senior touch: Fix permissions for Docker volumes in CI
          mkdir -p database guardian/learned
          chmod -R 777 database guardian/learned
          
          export GUARDIAN_BIND_IP=0.0.0.0
          docker compose up -d --build guardian
          echo "Waiting for guardian to reach healthy state..."
          # Better than sleep: retry curl for 30 seconds
          for i in {1..15}; do
            if curl -s -f -H "X-API-Key: ci-test-key-123" http://localhost:5000/health; then
              echo "Guardian is UP!"
              exit 0
            fi
            echo "Waiting... ($i)"
            sleep 2
          done
          echo "ERROR: Guardian failed to start or is unreachable"
          docker logs lab-guardian
          exit 1
